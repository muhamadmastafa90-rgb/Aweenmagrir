<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بۆ تاقانەکەم 🌸</title>
    <!-- هێنانی فۆنتی شیرینی کوردی بۆ نوسینەکان -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rudur&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #fff5f5 0%, #fff0f6 50%, #f3e8ff 100%);
            color: #4a044e;
            font-family: 'Rudur', 'Courier New', Tahoma, sans-serif;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 2;
        }

        .music-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(244, 114, 182, 0.1);
            border: 1px solid rgba(244, 114, 182, 0.3);
        }

        .music-btn {
            background: linear-gradient(135deg, #f472b6 0%, #d946ef 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(244, 114, 182, 0.3);
            width: 100%;
            font-family: 'Rudur', sans-serif;
            transition: all 0.2s ease;
        }

        .story-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 35px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(219, 39, 119, 0.08);
            border: 2px solid rgba(244, 114, 182, 0.25);
            text-align: center;
        }

        .main-title {
            font-size: 22px;
            font-weight: 800;
            color: #701a75;
            margin-bottom: 5px;
            font-family: 'Rudur', sans-serif;
        }

        .panda-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            animation: floatPanda 4s ease-in-out infinite alternate;
        }

        @keyframes floatPanda {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        .shair-premium {
            background: linear-gradient(135deg, #fff0f6 0%, #f3e8ff 100%);
            padding: 15px;
            border-radius: 22px;
            font-style: italic;
            color: #db2777;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.8;
            margin-bottom: 25px;
            border-right: 4px solid #db2777;
            font-family: 'Rudur', sans-serif;
        }

        /* بەشی تایبەت بە فۆنتی تایپینگی کوردی */
        .text-body {
            text-align: justify;
            line-height: 2.3;
            font-size: 16px;
            color: #3b0764;
            min-height: 200px;
            white-space: pre-line;
            font-family: 'Rudur', 'Courier New', monospace; /* فۆنتی شێوازی تایپینگ */
            font-weight: 500;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 18px;
            background-color: #db2777;
            margin-right: 3px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .floating-heart {
            position: absolute;
            pointer-events: none;
            animation: moveUp 4.5s linear infinite;
            opacity: 0;
            z-index: 1;
        }

        @keyframes moveUp {
            0% { transform: translateY(100vh) scale(0.6); opacity: 0; }
            15% { opacity: 0.8; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
        }

        /* شاردنەوەی یاریەکە لە پشت شاشە بۆ کارکردنی مسۆگەری گۆرانییەکە */
        #youtube-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- بەستەر و کۆدی یوتیوبی فەرمی لۆ گۆرانی Scared to Fall in Love تا بە مسۆگەری لێبدرێت -->
    <iframe id="youtube-player" src="https://www.youtube.com/embed/S2pS6p_5_QY?enablejsapi=1&loop=1&playlist=S2pS6p_5_QY" allow="autoplay"></iframe>

    <div class="container">
        
        <div class="music-card">
            <button class="music-btn" onclick="startEverything()" id="btn-text">🎵 کرتە بکە بۆ لێدانی گۆرانی و خوێندنەوەی نامەکە</button>
        </div>

        <div class="story-card">
            <h1 class="main-title">بۆ شاژنی دڵم 🧸</h1>
            
            <!-- وێنەی دوو پاندای کارتۆنی ئاشق بە کۆدی ناوخۆیی -->
            <div class="panda-container">
                <svg width="220" height="120" viewBox="0 0 220 120" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="60" cy="70" r="35" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="35" cy="40" r="12" fill="#333"/>
                    <circle cx="85" cy="40" r="12" fill="#333"/>
                    <ellipse cx="48" cy="65" rx="8" ry="12" fill="#333"/>
                    <ellipse cx="72" cy="65" rx="8" ry="12" fill="#333"/>
                    <circle cx="48" cy="63" r="3" fill="white"/>
                    <circle cx="72" cy="63" r="3" fill="white"/>
                    <circle cx="60" cy="75" r="4" fill="#333"/>
                    <ellipse cx="40" cy="78" rx="5" ry="3" fill="#ffb6c1"/>
                    <ellipse cx="80" cy="78" rx="5" ry="3" fill="#ffb6c1"/>
                    
                    <path d="M110 55 C105 45, 95 45, 95 55 C95 65, 110 75, 110 75 C110 75, 125 65, 125 55 C125 45, 115 45, 110 55 Z" fill="#ff3366" transform="scale(1.2) translate(-18, -10)"/>
                    
                    <circle cx="160" cy="70" r="35" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="135" cy="40" r="12" fill="#333"/>
                    <circle cx="185" cy="40" r="12" fill="#333"/>
                    <ellipse cx="148" cy="65" rx="8" ry="12" fill="#333"/>
                    <ellipse cx="172" cy="65" rx="8" ry="12" fill="#333"/>
                    <circle cx="148" cy="63" r="3" fill="white"/>
                    <circle cx="172" cy="63" r="3" fill="white"/>
                    <circle cx="160" cy="75" r="4" fill="#333"/>
                    <ellipse cx="140" cy="78" rx="5" ry="3" fill="#ffb6c1"/>
                    <ellipse cx="180" cy="78" rx="5" ry="3" fill="#ffb6c1"/>
                </svg>
            </div>

            <div class="shair-premium">
                «با بڕوخێ مۆندیال و دنیا و ناوبژیوان...» ❤️<br>
                «کریستیانۆش دەرکرا، گرنگ نییە... تۆ تەنها جامی منی!» 🏆
            </div>

            <div class="text-body" id="typing-text">بۆ دەستپێکردنی نامەکە، تکایە سەرەتا کلیک لەسەر دوگمەی سەرەوە بکە... 🌸</div>
        </div>

    </div>

    <script>
        let player;
        // پەیوەندیکردن بە فۆرمی یوتیوبەوە بۆ کۆنترۆڵکردنی دەنگەکە
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player');
        }
        
        // بارکردنی سکریپتی فەرمی یوتیوب
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        const btnText = document.getElementById('btn-text');
        const typingContainer = document.getElementById('typing-text');

        const fullMessage = `سڵاو لە دڵە میهرەبانەکەت... دەزانم چەندە خەمباری لۆ دەرکرانی کریستیانۆ ڕۆناڵدۆ و چەندە بە پەرۆش بووی بۆی، بەڵام ویستم پێتبڵێم هیچ شتێک لەم دنیایەدا شایەنی ئەوە نییە ئەو چاوە جوانانەت غەمبار بکات. تۆپی پێ تەنها یارییەکە، بەڵام بوونی تۆ لە ژیانی مندا گرنگترین ڕاستییە. 🌟

با جیهان هەرچۆنێک بێت، تۆ لای من هەمیشە لە پلەی یەکەمی و گەورەترین نازناوی منی. تۆ تەواوی دنیای منی و هیچ دۆڕانێک ناتوانێت لە بەهای تۆ کەم بکاتەوە لای من. 🧸

ئێستا خەمەکانت لەبیربکە و وەرە باوەشی من... لێرە چاوەڕێتم، بە هێواشی ماچت دەکەم و دڵت دەدەمەوە تا دووبارە ئەو زەردەخەنە کویتەت بگەڕێتەوە سەر لێوت. تەنها یەک داواکاریم لێت هەیە؛ تکایە وازی لەو شتە بێنە و با هیچ شتێک مەودا نەخاتە نێوانمان. من و تۆ پێکەوە هەمیشە براوەین. 🌸💜`;

        let index = 0;
        let isTypingStarted = false;
        let isPlaying = false;

        function startEverything() {
            if (!isPlaying) {
                // لێدانی گۆرانی یوتیوبەکە بە فەرمی
                if(player && player.playVideo) {
                    player.playVideo();
                }
                btnText.innerText = "⏸️ ڕاگرتنی گۆرانییەکە";
                isPlaying = true;
                
                if (!isTypingStarted) {
                    typingContainer.innerHTML = "";
                    isTypingStarted = true;
                    typeText();
                }
            } else {
                if(player && player.pauseVideo) {
                    player.pauseVideo();
                }
                btnText.innerText = "🎵 لێدانی گۆرانی کاتی خوێندنەوە";
                isPlaying = false;
            }
        }

        function typeText() {
            if (index < fullMessage.length) {
                typingContainer.innerHTML = fullMessage.substring(0, index + 1) + '<span class="cursor"></span>';
                index++;
                setTimeout(typeText, 60); // خێرایی هێواش و مۆدێرنی تایپینگ لۆ خوێندنەوە
            } else {
                typingContainer.innerHTML = fullMessage;
            }
        }

        function dropHearts() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = ['💜', '💖', '🤍', '🌸', '✨', '💕'][Math.floor(Math.random() * 6)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 12 + 'px';
            heart.style.animationDuration = Math.random() * 2 + 3.5 + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4500);
        }

        setInterval(dropHearts, 250);
    </script>
</body>
</html>
