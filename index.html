<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بۆ تاقانەکەم 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #fff5f5 0%, #fff0f6 50%, #f3e8ff 100%);
            color: #4a044e;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* دوگمەی مۆسیقای پریمێوم */
        .music-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(244, 114, 182, 0.1);
            border: 1px solid rgba(244, 114, 182, 0.3);
        }

        .music-btn {
            background: linear-gradient(135deg, #f472b6 0%, #d946ef 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(244, 114, 182, 0.3);
            width: 100%;
            transition: all 0.2s ease;
        }

        .music-btn:active {
            transform: scale(0.97);
        }

        /* کارتی ناوەڕۆک */
        .story-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 35px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(219, 39, 119, 0.08);
            border: 2px solid rgba(244, 114, 182, 0.25);
            text-align: center;
        }

        .main-title {
            font-size: 22px;
            font-weight: 800;
            color: #701a75;
            margin-bottom: 5px;
        }

        /* چوارچێوەی وێنەی پاندا ئاشقەکان */
        .panda-frame {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .panda-img {
            width: 100%;
            max-width: 260px;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(244, 114, 182, 0.15);
            animation: floatPanda 4s ease-in-out infinite alternate;
        }

        @keyframes floatPanda {
            0% { transform: translateY(0) rotate(-1deg); }
            100% { transform: translateY(-8px) rotate(1deg); }
        }

        /* بەشی هۆنراوە جێگیرەکە */
        .shair-premium {
            background: linear-gradient(135deg, #fff0f6 0%, #f3e8ff 100%);
            padding: 15px;
            border-radius: 22px;
            font-style: italic;
            color: #db2777;
            font-size: 16.5px;
            font-weight: 700;
            line-height: 1.8;
            margin-bottom: 25px;
            border-right: 4px solid #db2777;
        }

        /* بەشی ئەنیمێیشنی تایپینگی نامەکە */
        .text-body {
            text-align: justify;
            line-height: 2.1;
            font-size: 16px;
            color: #3b0764;
            min-height: 200px; /* بۆ ئەوەی شاشەکە تێکنەچێت کاتێک دەنوسرێت */
            white-space: pre-line;
        }

        /* نیشاندەری تایپینگ (Cursor) */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 18px;
            background-color: #db2777;
            margin-right: 3px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* دڵە باراوەکان */
        .floating-heart {
            position: absolute;
            pointer-events: none;
            animation: moveUp 4.5s linear infinite;
            opacity: 0;
            z-index: -1;
        }

        @keyframes moveUp {
            0% { transform: translateY(100vh) scale(0.6); opacity: 0; }
            15% { opacity: 0.8; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- گۆرانییەکی کلاسیکی یەکجار دڵنشین و ئاشقانەی ئینگلیزی بە دەنگ (Vocal) -->
    <audio id="love-song" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <div class="container">
        
        <!-- کۆنترۆڵی مۆسیقا -->
        <div class="music-card">
            <button class="music-btn" onclick="startEverything()" id="btn-text">🎵 کرتە بکە لۆ لێدانی گۆرانی و خوێندنەوەی نامەکە</button>
        </div>

        <!-- کارتی سەرەکی -->
        <div class="story-card">
            <h1 class="main-title">بۆ شاژنی دڵم 🧸</h1>
            
            <!-- وێنەی دوو پاندای ڕاستەقینەی ئاشق و زۆر شیرین لە باوەشی یەکدا -->
            <div class="panda-frame">
                <img src="https://img.freepik.com/premium-vector/cute-panda-couple-love-cartoon-vector-illustration_494539-725.jpg" alt="Cute Panda Couple In Love" class="panda-img">
            </div>

            <!-- هۆنراوە سەرەکییەکە -->
            <div class="shair-premium">
                «با بڕوخێ مۆندیال و دنیا و ناوبژیوان...» ❤️<br>
                «کریستیانۆش دەرکرا، گرنگ نییە... تۆ تەنها جامی منی!» 🏆
            </div>

            <!-- ئەم بەشە بە شێوازی تایپینگ دەنوسرێتەوە کاتێک کلیک لەسەر دوگمەکە دەکات -->
            <div class="text-body" id="typing-text">بۆ دەستپێکردنی نامەکە، تکایە سەرەتا کلیک لەسەر دوگمەی سەرەوە بکە... 🌸</div>
        </div>

    </div>

    <script>
        const loveSong = document.getElementById('love-song');
        const btnText = document.getElementById('btn-text');
        const typingContainer = document.getElementById('typing-text');

        // دەقی نامەکە کە بە شێوازی تایپینگ دێت
        const fullMessage = `سڵاو لە دڵە میهرەبانەکەت... دەزانم چەندە خەمباری لۆ دەرکرانی کریستیانۆ ڕۆناڵدۆ و چەندە بە پەرۆش بووی بۆی، بەڵام ویستم پێتبڵێم هیچ شتێک لەم دنیایەدا شایەنی ئەوە نییە ئەو چاوە جوانانەت غەمبار بکات. تۆپی پێ تەنها یارییەکە، بەڵام بوونی تۆ لە ژیانی مندا گرنگترین ڕاستییە. 🌟

با جیهان هەرچۆنێک بێت، تۆ لای من هەمیشە لە پلەی یەکەمی و گەورەترین نازناوی منی. تۆ تەواوی دنیای منی و هیچ دۆڕانێک ناتوانێت لە بەهای تۆ کەم بکاتەوە لای من. 🧸

ئێستا خەمەکانت لەبیربکە و وەرە باوەشی من... لێرە چاوەڕێتم، بە هێواشی ماچت دەکەم و دڵت دەدەمەوە تا دووبارە ئەو زەردەخەنە کویتەت بگەڕێتەوە سەر لێوت. تەنها یەک داواکاریم لێت هەیە؛ تکایە وازی لەو شتە بێنە و با هیچ شتێک مەودا نەخاتە نێوانمان. من و تۆ پێکەوە هەمیشە براوەین. 🌸💜`;

        let index = 0;
        let isTypingStarted = false;

        function startEverything() {
            // لێدانی گۆرانییەکە
            if (loveSong.paused) {
                loveSong.play();
                btnText.innerText = "⏸️ ڕاگرتنی گۆرانییەکە";
                
                // تەنها یەکجار ئەنیمێیشنی تایپینگەکە دەستپێدەکات
                if (!isTypingStarted) {
                    typingContainer.innerHTML = "";
                    isTypingStarted = true;
                    typeText();
                }
            } else {
                loveSong.pause();
                btnText.innerText = "🎵 لێدانی گۆرانی کاتی خوێندنەوە";
            }
        }

        function typeText() {
            if (index < fullMessage.length) {
                // زیادکردنی پیت بە پیت
                typingContainer.innerHTML = fullMessage.substring(0, index + 1) + '<span class="cursor"></span>';
                index++;
                // خێرایی نووسینی پیتەکان (٤5 میلی چرکە لۆ هەر پیتێک)
                setTimeout(typeText, 45);
            } else {
                // لادانی هێڵی تایپینگ کاتێک تەواو دەبێت
                typingContainer.innerHTML = fullMessage;
            }
        }

        // بارینی دڵەکان لە باگراوەنددا
        function dropHearts() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = ['💜', '💖', '🤍', '🌸', '✨', '💕'][Math.floor(Math.random() * 6)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 12 + 'px';
            heart.style.animationDuration = Math.random() * 2 + 3.5 + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4500);
        }

        setInterval(dropHearts, 250);
    </script>
</body>
</html>
